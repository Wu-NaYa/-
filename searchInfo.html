<script type="text/javascript" src="search/js/Chart.js"></script>
<script type="text/javascript">
    var relation=[];
    var dname="";
    var dom = document.getElementById("Chartcontainer");
    var myChart = echarts.init(dom);
    var app = {};
    var option;
    /*通过ajax获取所有数据*/
    var datas=[];
    var links=[];
    $(document).ready(function(e) {
        //loadHTML();
        var $dashChartBarsCnt  = jQuery( '.js-chartjs-bars' )[0].getContext( '2d' ),
            $dashChartLinesCnt = jQuery( '.js-chartjs-lines' )[0].getContext( '2d' );



        new Chart($dashChartBarsCnt, {
            type: 'bar',
            data: $dashChartBarsData
        });

        var myLineChart = new Chart($dashChartLinesCnt, {
            type: 'line',
            data: $dashChartLinesData,
        });
    });


    /*加载页面*/
    function loadHTML(){
        //alert("ok");
        $.ajax({
            url:"/showRelation",
            type:"get",
            data:{
              dname:"乳腺癌"
            },
            dataType:"json",
            success:function(data){
                //alert(data[0].name);
                //alert(data.length);
                for(var i=0;i<=data.length;i++){
                        $("#diseaseOne").append('<li> <a href=##" onclick="clickRelation(this)">'+data[i].name+'</a> </li>');
                }
            }
        });
       // alert("ok");
    }
    /*给每一种关系添加点击事件*/
    function clickRelation(ths){
        /*获取模板节点*/
        var tModel=$('#trModel tbody');
        //tModel.find("td").eq(0).text(2);
        /*获取关系*/
        var rname=$(ths).text();
        /*获取疾病名*/
        var dname=$(ths).parents("ul").prev().text();

        $.ajax({
            url:"/getSymptom",
            type:"post",
            data:{
                rname:rname,
                dname:dname
            },
            dataType:"json",
            success:function(data){
                //alert(data[0].name);
                //alert(data.length);
                $("#bodyContent").empty();
                for(var i=0;i<=data.length;i++){
                   tModel.find("td").eq(0).text(i+1);
                   tModel.find("td").eq(1).text(data[i].name);
                   $("#bodyContent").append(tModel.html());
                }
            }
        });
        //$('#bodyContent').append($('#trModel').parent().html());
        //alert();
        //alert($(ths).text());
    }
    /*点击加载事件*/
    function clickDisease(ths){
        var newdname=$(ths).text();
        if(newdname!=dname){
            relation=[];
            datas=[];
            links=[];
            dname=newdname;
            getChartInfo();
        }else{
            return 0;
        }

        var thiscode=$(ths).next();
        //获取该菜单长度
        var length=thiscode.children().length;
        /*如果长度为0，就加载，不等于0，就不加载*/
        if(length==0){
            $.ajax({
                url:"/showRelation",
                type:"post",
                data:{
                    dname:dname
                },
                dataType:"json",
                success:function(data){
                    //alert(data[0].name);
                    //alert(data.length);
                    for(var i=0;i<=data.length;i++){
                        thiscode.append('<li> <a href=##" class="d1" onclick="clickRelation(this)">'+data[i].name+'</a> </li>');
                    }
                }
            });
        }

    }
    /*获取表格数据*/
    function getChartInfo(){
        $.ajax({
            url:"/getOneEData",
            type:"post",
            data:{
                dname:dname
            },
            async: true,
            dataType:"json",
            success:function(data){

                //alert(data.length);
                datas.push({
                    name:dname
                });
                for(var i=0;i<data.length;i++){
                    // alert(data[i].rname);
                    relation.push(data[i].rname);
                }
                for(var i=0;i<data.length;i++){
                    for(var j=0;j<data[i].sList.length;j++){
                        datas.push({
                            name:data[i].sList[j].name,
                            value:data[i].rname
                        });
                        links.push({
                            source: dname,
                            target: data[i].sList[j].name,
                            symbolSize: [5, 5],
                            value:data[i].rname,
                            label:{
                                show:true,
                                formatter:function(){
                                    return relation[i];
                                },
                                fontSize:10
                            }

                        });
                    }
                }
                loadChart(datas,links);
            }
        });
    }

    /*加载表格*/
    function loadChart(datas,links){
        option = {
            title: {
                text: dname
            },
            tooltip: {},
            animationDurationUpdate: 1500,
            animationEasingUpdate: 'quinticInOut',
            series: [
                {
                    type: 'graph',
                    layout: 'circular',
                    symbolSize: 40,
                    roam: true,
                    label: {
                        show: true
                    },
                    edgeSymbol: ['circle', 'arrow'],
                    edgeSymbolSize: [4, 5],
                    edgeLabel: {
                        fontSize: 1
                    },
                    data:datas,
                    links: links,
                    lineStyle: {
                        opacity: 0.9,
                        width: 1,
                        curveness: 0
                    }
                }
            ]
        };

        if (option && typeof option === 'object') {
            myChart.setOption(option);
        }
    }
</script>
