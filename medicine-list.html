    <table class="layui-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>药名</th>
            <th>价格</th>
            <th>保质期</th>
            <th>使用方法</th>
            <th>适用症状</th>
            <th>不适用人群</th>
            <th>操作</th>
        </thead>
        <tbody id="bodyContent">
        </tbody>

    <div style="display: none">
        <table>
            <tbody id="bodyModel">

                <td></td>

                <td></td>
                <td class="td-manage">
                    <button class="layui-btn" onclick="editThis(this)">编辑</button>
                    <button class="layui-btn layui-btn-danger" onclick="member_del(this,$(this).parents('tr').children().eq(0).text())">删除</button>
                </td>

<script>
    var editRecord={}
    layui.use(['table','form','layer'], function(){
        $ = layui.jquery;
        var form = layui.form,
            table=layui.table
            ,layer = layui.layer;
    });
    function submitInfo(obj){
        var dom=$(obj).parents("tr").children();
        // var newRecord=editRecord;
        var id=dom.eq(0).find("input").val();
        var name=dom.eq(1).find("input").val();
        var price=dom.eq(2).find("input").val();
        var validityPeriod=dom.eq(3).find("input").val();
        var method=dom.eq(4).find("input").val();
        var suitablePopulation=dom.eq(5).find("input").val();
        var specialPeople=dom.eq(6).find("input").val();
        var newMedicine={
            id:id,
            name:name,
            price:price,
            validityPeriod:validityPeriod,
            method:method,
            suitablePopulation:suitablePopulation,
            specialPeople:specialPeople
        }
       // alert(id+userName+methodPrice+methodName);
        $.ajax({
            type:"post",
            url:"/medicine/updateMedicine",
            data:newMedicine,
            dataType: "json",
            success:function(data){
                if (data){
                    alert("修改成功");
                    location.reload();
                }
            },error:function (){
                alert("发现未知错误");
            }
        });
    }
    function editThis(obj){
        var dom=$(obj).parents("tr").children();
        var id=dom.eq(0).text();
        var name=dom.eq(1).text();
        var price=dom.eq(2).text();
        var validityPeriod=dom.eq(3).text();
        var method=dom.eq(4).text();
        var suitablePopulation=dom.eq(5).text();
        var specialPeople=dom.eq(6).text();
        dom.eq(0).html("<input type='text' class='layui-input' disabled value="+id+">");
        dom.eq(1).html("<input type='text' class='layui-input'  value="+name+">");
        dom.eq(2).html("<input type='text' class='layui-input' value="+price+">");
        dom.eq(3).html("<input type='text' class='layui-input' value="+validityPeriod+">");
        dom.eq(4).html("<input type='text' class='layui-input' value="+method+">");
        dom.eq(5).html("<input type='text' class='layui-input' value="+suitablePopulation+">");
        dom.eq(6).html("<input type='text' class='layui-input' value="+specialPeople+">");
        dom.eq(7).html("<input type='button' class='layui-btn' onclick='submitInfo(this)' value='确定'>");
        // editRecord.id=id;
        // editRecord.userName=userName;
        // editRecord.methodName=methodName;
        // editRecord.methodPrice=methodPrice;
        // alert($("#editModel").html());
        var modelHtml=$("#editModel").html();
        $(obj).parents("tr").html(modelHtml);
    }
    function loadTable(){
        var content=$("#bodyContent");
        var trmodel=$("#bodyModel");
        $.ajax({
            type:"get",
            url:"/medicine/listMedicine",
            dataType:"json",
            success:function (data){
                //alert(data.length);
                for (var i=0;i<data.length;i++){
                    trmodel.find("td").eq(0).text(data[i].id);
                    trmodel.find("td").eq(1).text(data[i].name);
                    trmodel.find("td").eq(2).text(data[i].price);
                    trmodel.find("td").eq(3).text(data[i].validityPeriod);
                    trmodel.find("td").eq(4).text(data[i].method);
                    trmodel.find("td").eq(5).text(data[i].suitablePopulation);
                    trmodel.find("td").eq(6).text(data[i].specialPeople);
                    content.append(trmodel.html());
                }
            }
        });
    }
    loadTable();


    /*用户-删除*/
    function member_del(obj,id){
        layer.confirm('确认要删除吗？',function(index){
            //发异步删除数据
            $.ajax({
                url:"/medicine/deleteMedicine",
                data:{id:id},
                success:function(rel){
                    if (rel) {
                        layer.msg('删除成功', {icon: 1});
                        //location.href="/course/courseList";
                        $(".layui-form-checked").not('.header').parents('tr').remove();
                    } else {
                        layer.msg('删除失败');
                    }
                }
            })
            $(obj).parents("tr").remove();
            layer.msg('已删除!',{icon:1,time:1000});
        });
    }




</script>
