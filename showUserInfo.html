<script type="text/javascript">
  function getUserName(){
    $.ajax({
      type:"get",
      url:"/getUserName",
      success:function(data){
        $("#userName").text(data);
      }
    });
  }
  getUserName();
  $.ajax({
    type:"get",
    url:"/user/getUserInfo",
    dataType:"json",
    success:function (data){
      $("#id").val(data.id);
      $("#name").val(data.name);
      $("#password").val(data.password);
      $("#phone").val(data.phone);
      $("#email").val(data.email);
    }
  });
 function submitUpdateInfo(){
   var user={
     id: $("#id").val(),
     password:$("#password").val(),
     email:$("#email").val(),
     phone: $("#phone").val()
   }
   $.ajax({
     type:"post",
     url:"/user/updateUser",
     data:{
       user:JSON.stringify(user)
     },
     dataType:"json",
     success:function (data){
       if(data){
        alert("修改成功");
       }else{
         alert("修改失败");
       }
     }
   });
 }
</script>
