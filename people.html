<script type="text/javascript">
        var myChart = echarts.init(document.getElementById('lpeftmidbot'));
        option = {

            tooltip: {},
            radar: {
                // shape: 'circle',
                radius: '60%',
                indicator: [
                    { name: '20-30岁',max:90},
                    { name: '30-40岁',max:90},
                    { name: '40-50岁',max:90},
                    { name: '50-60岁',max:90},
                    { name:'60-70岁',max:90},
                    { name:'70-80岁',max:90}
                ]
            },
            series: [{
                name: '人数/万',
                type: 'radar',
                // areaStyle: {normal: {}},
                itemStyle: {normal: {areaStyle: {type: 'default'}}},
                data : [
                    {
                        value : [51,60,85,65,45,35,20],
                        name : '人数/万',
                    },

                ]
            }]
        };
        var app = {
            currentIndex: -1,
        };
        setInterval(function () {
            var dataLen = option.series[0].data.length;
            // 取消之前高亮的图形
            myChart.dispatchAction({
                type: 'downplay',
                seriesIndex: 0,
                dataIndex: app.currentIndex
            });
            app.currentIndex = (app.currentIndex + 1) % dataLen;
            //console.log(app.currentIndex);
            // 高亮当前图形
            myChart.dispatchAction({
                type: 'highlight',
                seriesIndex: 0,
                dataIndex: app.currentIndex,
            });
            // 显示 tooltip
            myChart.dispatchAction({
                type: 'showTip',
                seriesIndex: 0,
                dataIndex: app.currentIndex
            });
        }, 1000);
        myChart.setOption(option);
    </script>
