<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>药物添加</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi" />
    <link rel="shortcut icon" href="layuistatic/favicon.ico" type="layuistatic/image/x-icon" />
    <link rel="stylesheet" href="layuistatic/css/font.css">
    <link rel="stylesheet" href="layuistatic/css/xadmin.css">
    <script type="text/javascript" src="https://cdn.bootcss.com/jquery/3.2.1/jquery.min.js"></script>
    <script type="text/javascript" src="layuistatic/lib/layui/layui.js" charset="utf-8"></script>
    <script type="text/javascript" src="layuistatic/js/xadmin.js"></script>
    <!-- 让IE8/9支持媒体查询，从而兼容栅格 -->
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>

<body>
<div class="x-body">
    <form class="layui-form">

        <div class="layui-form-item">
            <label for="name" class="layui-form-label">
                <span class="x-red">*</span>药名
            </label>
            <div class="layui-input-inline">
                <input type="text" id="name" name="name" required=""
                       autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label for="price" class="layui-form-label">
                <span class="x-red">*</span>价格
            </label>
            <div class="layui-input-inline">
                <input type="text" id="price" name="price" required=""
                       autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label for="validityPeriod" class="layui-form-label">
                <span class="x-red">*</span>保质期
            </label>
            <div class="layui-input-inline">
                <input type="text" id="validityPeriod" name="validityPeriod" required=""
                       autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label for="method" class="layui-form-label">
                <span class="x-red">*</span>使用方法
            </label>
            <div class="layui-input-inline">
                <input type="text" id="method" name="method" required=""
                       autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label for="suitablePopulation" class="layui-form-label">
                <span class="x-red">*</span>适合症状
            </label>
            <div class="layui-input-inline">
                <input type="text" id="suitablePopulation" name="suitablePopulation" required=""
                       autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label for="specialPeople" class="layui-form-label">
                <span class="x-red">*</span>特殊人群
            </label>
            <div class="layui-input-inline">
                <input type="text" id="specialPeople" name="specialPeople" required=""
                       autocomplete="off" class="layui-input">
            </div>
        </div>




        <div class="layui-form-item" style="text-align: center;">

            <button  class="layui-btn" lay-filter="add" lay-submit="">
                增加
            </button>
        </div>
    </form>
</div>
<script>
    layui.use(['laydate','form','layer'], function(){
        $ = layui.jquery;
        var form = layui.form
            ,layer = layui.layer,
            laydate = layui.laydate;
        //执行一个laydate实例
        laydate.render({
            elem: '.test', //指定元素
            trigger:'click'
        });



        //监听提交
        form.on('submit(add)', function(data){
            console.log(data);
            //发异步，把数据提交给java
            $.ajax({
                url:"/medicine/insertMedicine",
                data:data.field,
                type:'post',
                success:function(rel){
                    if (rel=="ok"){
                        layer.alert("添加成功！",{icon:6},function(){
                            location.reload();
                        });
                    }
                },error:function (){
                  layer.alert("添加失败，发生未知错误");
                }
            })
            return false;
        });

    });
</script>

</body>

</html>
