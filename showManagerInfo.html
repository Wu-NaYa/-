<script type="text/javascript">
  function getUserName(){

    $.ajax({
      type:"get",
      url:"/getManagerName",
      success:function(data){
        $("#managerName").text(data);
      }
    });
  }
  getManagerName();
  $.ajax({
    type:"get",
    url:"/manager/getManagerInfo",
    dataType:"json",
    success:function (data){
      $("#id").val(data.id);
      $("#name").val(data.name);
      $("#password").val(data.password);
    }
  });
 function submitUpdateInfo(){
   var manager={
     id: $("#id").val(),
     password:$("#password").val()
   }
   $.ajax({
     type:"post",
     url:"/manager/updateManager",
     data:{
       manager:JSON.stringify(manager)
     },
     dataType:"json",
     success:function (data){
       if(data){
        alert("修改成功");
       }else{
         alert("修改失败");
       }
     }
   });
 }
